<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL DE ADMINISTRADOR</title>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .tarjeta { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; }
        h1 { color: #00ff88; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        .btn-activar { background: #00ff88; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .estado { font-weight: bold; }
        .activo { color: #00ff88; }
        .pendiente { color: #ff9494; }
    </style>
</head>
<body>

<div class="tarjeta">
    <h1>Panel de Control Admin</h1>
    <table>
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="lista-usuarios"></tbody>
    </table>
    <br>
    <button onclick="window.location.href='index.html'" style="width:100%; padding:10px; background:#333; color:white; border:none; cursor:pointer;">Volver a la Quiniela</button>
</div>

<script>
    const CLAVE_LOCAL = 'quiniela_prod_v2';

    function renderizarAdmin() {
        const lista = JSON.parse(localStorage.getItem(CLAVE_LOCAL)) || [];
        const tbody = document.getElementById('lista-usuarios');
        tbody.innerHTML = "";

        lista.forEach((u, index) => {
            if (u.usuario === 'admin') return; // No editar al admin
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.usuario}</td>
                <td class="estado ${u.pagado ? 'activo' : 'pendiente'}">${u.pagado ? 'ACTIVADO' : 'PENDIENTE'}</td>
                <td>
                    ${!u.pagado ? `<button class="btn-activar" onclick="activarUsuario(${index})">Activar</button>` : '---'}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function activarUsuario(index) {
        let lista = JSON.parse(localStorage.getItem(CLAVE_LOCAL));
        lista[index].pagado = true;
        localStorage.setItem(CLAVE_LOCAL, JSON.stringify(lista));
        renderizarAdmin();
        alert("Usuario activado con éxito. Ya tiene acceso a la quiniela.");
    }

    renderizarAdmin();
</script>
</body>
</html>
